<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found | Global Univiza</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background: var(--green-dark);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      text-align: center;
      overflow: hidden;
    }
    .c404 {
      padding: 40px;
      max-width: 600px;
      animation: fadeIn 1.2s ease-out;
    }
    .c404-tag {
      font-size: 110px;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 20px;
      background: linear-gradient(to bottom, var(--gold), #fff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      opacity: 0.9;
    }
    .c404 h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(32px, 5vw, 48px);
      margin-bottom: 16px;
    }
    .c404 p {
      font-size: 18px;
      opacity: 0.7;
      margin-bottom: 40px;
      line-height: 1.6;
    }
    .btn-home {
      display: inline-flex;
      background: var(--orange);
      color: white;
      padding: 18px 40px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 700;
      font-size: 16px;
      transition: all 0.3s;
      box-shadow: 0 10px 40px rgba(242, 92, 5, 0.2);
    }
    .btn-home:hover {
      transform: translateY(-4px);
      box-shadow: 0 15px 50px rgba(242, 92, 5, 0.4);
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .bg-rings {
      position: absolute;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      z-index: -1;
      opacity: 0.15;
    }
    .bg-ring {
      position: absolute;
      border: 1px solid white;
      border-radius: 50%;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      animation: pulsate 10s infinite alternate ease-in-out;
    }
    @keyframes pulsate {
      from { width: 40vw; height: 40vw; opacity: 1; }
      to { width: 90vw; height: 90vw; opacity: 0.2; }
    }
  </style>
</head>
<body>
  <div class="bg-rings">
    <div class="bg-ring" style="animation-delay: 0s;"></div>
    <div class="bg-ring" style="width: 60vw; height: 60vw; animation-delay: -3s;"></div>
    <div class="bg-ring" style="width: 80vw; height: 80vw; animation-delay: -6s;"></div>
  </div>

  <div class="c404">
    <div class="c404-tag">404</div>
    <h1>Lost in <em>Travel</em>?</h1>
    <p>The page you are looking for might have moved or doesn't exist. Let's get you back on track to your dream university.</p>
    <a href="index.html" class="btn-home">Return to Global Univiza →</a>
  </div>
</body>
</html>
